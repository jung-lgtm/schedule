<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>每日工作排程</title>
<style>
:root {
  --blue:       #1565c0;
  --blue-d:     #0d47a1;
  --blue-l:     #e3f2fd;
  --blue-mid:   #bbdefb;
  --green:      #2e7d32;
  --orange:     #e65100;
  --amber:      #f57f17;
  --red:        #c62828;
  --gray:       #607d8b;
  --gray-l:     #eceff1;
  --border:     #cfd8dc;
  --white:      #fff;
  --bg:         #f0f4f8;
  --text:       #1a2635;
  --text-2:     #546e7a;
  --radius:     10px;
  --safe-b:     env(safe-area-inset-bottom, 0px);
}
*,*::before,*::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html,body { height:100%; margin:0; background:var(--bg); color:var(--text);
  font-family:"Noto Sans TC","Segoe UI",system-ui,sans-serif; font-size:15px; }

/* ── TOPBAR ── */
.topbar {
  position: sticky; top:0; z-index:200;
  background: var(--blue-d);
  padding: 12px 16px 10px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
.topbar-title { color:#fff; font-size:15px; font-weight:700; line-height:1.2; }
.topbar-sub   { color:rgba(255,255,255,.65); font-size:11px; margin-top:1px; }
.topbar-btn {
  background: rgba(255,255,255,.15); border:none; color:#fff;
  border-radius:8px; padding:7px 13px; font-size:13px; font-weight:600;
  cursor:pointer; display:flex; align-items:center; gap:5px;
}
.topbar-btn:active { background:rgba(255,255,255,.28); }

/* ── BOTTOM BAR ── */
.bottombar {
  position: fixed; bottom:0; left:0; right:0; z-index:200;
  background: var(--white);
  border-top: 1px solid var(--border);
  padding: 10px 16px calc(10px + var(--safe-b));
  display: flex; gap:10px;
  box-shadow: 0 -2px 10px rgba(0,0,0,.08);
}
.bb-btn {
  flex:1; border:none; border-radius:10px; padding:13px 8px;
  font-size:14px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:6px;
}
.bb-btn:active { filter:brightness(.9); }
.bb-save  { background:var(--gray-l); color:var(--blue-d); }
.bb-pdf   { background:var(--blue); color:#fff; flex:1.6; }

/* ── SCROLL AREA ── */
.scroll-area {
  padding: 14px 14px calc(90px + var(--safe-b));
  display: flex; flex-direction:column; gap:12px;
}

/* ── CARDS ── */
.card {
  background:var(--white); border-radius:var(--radius);
  border:1px solid var(--border);
  box-shadow:0 1px 4px rgba(0,0,0,.06);
  overflow:hidden;
}
.card-hd {
  background:var(--blue-l); border-bottom:1px solid var(--blue-mid);
  padding:9px 14px; font-size:12px; font-weight:700;
  color:var(--blue-d); letter-spacing:.03em;
  display:flex; align-items:center; gap:6px;
}
.card-body { padding:12px 14px; display:flex; flex-direction:column; gap:10px; }

/* ── FIELDS ── */
.field { display:flex; flex-direction:column; gap:4px; }
.field label { font-size:11px; font-weight:700; color:var(--text-2); letter-spacing:.04em; }
.field input, .field select {
  padding:11px 12px; border-radius:8px; border:1.5px solid var(--border);
  font-size:15px; font-family:inherit; background:#fafbfc; color:var(--text);
  appearance:none; -webkit-appearance:none;
}
.field input:focus, .field select:focus {
  outline:none; border-color:var(--blue); background:var(--white);
  box-shadow:0 0 0 3px var(--blue-l);
}

/* ── ROW CARDS ── */
.row-card {
  background:var(--white); border-radius:var(--radius);
  border:1.5px solid var(--border);
  box-shadow:0 1px 5px rgba(0,0,0,.06);
  overflow:hidden;
  transition: box-shadow .15s;
}
.row-card:active { box-shadow:0 2px 12px rgba(21,101,192,.15); }

.row-header {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; cursor:pointer;
  user-select:none;
}
.row-num {
  width:32px; height:32px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:15px; font-weight:700; flex-shrink:0;
  background:var(--blue-l); color:var(--blue);
}
.row-num.lunch-num { background:#fff9c4; color:var(--amber); }

.row-summary { flex:1; min-width:0; }
.row-time { font-size:13px; font-weight:700; color:var(--blue); }
.row-status-label {
  display:inline-block; margin-top:3px;
  font-size:11px; font-weight:700; color:#fff;
  padding:2px 9px; border-radius:20px;
}
.row-preview {
  font-size:12px; color:var(--text-2); margin-top:3px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.row-chevron { color:var(--gray); font-size:13px; flex-shrink:0; transition:transform .2s; }
.row-chevron.open { transform:rotate(90deg); }

.row-body {
  display:none; border-top:1px solid var(--border);
  padding:12px; flex-direction:column; gap:10px;
}
.row-body.open { display:flex; }

/* time row */
.time-row { display:flex; align-items:center; gap:8px; }
.time-row input[type=time] {
  flex:1; padding:10px 10px; border-radius:8px;
  border:1.5px solid var(--border); font-size:15px;
  font-family:inherit; background:#fafbfc;
}
.time-row input[type=time]:focus {
  outline:none; border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-l);
}
.time-sep { font-size:15px; color:var(--text-2); font-weight:600; }

.status-select {
  width:100%; padding:11px 12px; border-radius:8px;
  border:1.5px solid var(--border); font-size:14px;
  font-family:inherit; background:#fafbfc;
  appearance:none; -webkit-appearance:none;
}
.status-select:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-l); }

/* lang text areas */
.lang-group { display:flex; flex-direction:column; gap:6px; }
.lang-item { display:flex; gap:8px; align-items:flex-start; }
.lang-pill {
  width:26px; height:22px; border-radius:4px; flex-shrink:0; margin-top:3px;
  display:flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:700; color:#fff;
}
.p-zh { background:var(--blue); }
.p-vi { background:var(--red); }
.p-th { background:#ef6c00; }

.lang-item textarea {
  flex:1; padding:9px 11px; border-radius:8px;
  border:1.5px solid var(--border); font-size:13px;
  font-family:inherit; line-height:1.45; resize:none;
  background:#fafbfc; min-height:52px;
}
.lang-item textarea:focus {
  outline:none; border-color:var(--blue); background:var(--white);
  box-shadow:0 0 0 3px var(--blue-l);
}

/* row action strip */
.row-actions {
  display:flex; gap:8px; padding-top:4px;
  border-top:1px solid var(--gray-l);
}
.ra-btn {
  flex:1; border:none; border-radius:8px; padding:10px;
  font-size:13px; font-weight:600; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:5px;
}
.ra-btn:active { filter:brightness(.9); }
.ra-up   { background:var(--gray-l); color:var(--text-2); }
.ra-down { background:var(--gray-l); color:var(--text-2); }
.ra-del  { background:#fce4e4; color:var(--red); }

/* add bar */
.add-bar {
  background:var(--white); border-radius:var(--radius);
  border:1px solid var(--border);
  padding:12px 14px;
}
.add-bar-title { font-size:12px; font-weight:700; color:var(--text-2); margin-bottom:8px; }
.add-btns { display:flex; gap:8px; flex-wrap:wrap; }
.add-btn {
  background:var(--gray-l); color:var(--text); border:none;
  border-radius:8px; padding:9px 14px; font-size:13px; font-weight:600;
  cursor:pointer; display:flex; align-items:center; gap:4px;
}
.add-btn:active { background:var(--blue-l); color:var(--blue); }

/* zone colors */
.z-A { background:#2e7d32; }
.z-B { background:#1565c0; }
.z-C { background:#e65100; }
.z-L { background:#f57f17; }
.z-X { background:#607d8b; }

/* toast */
.toast {
  position:fixed; bottom:calc(80px + var(--safe-b)); left:50%;
  transform:translateX(-50%) translateY(10px);
  background:#1b5e20; color:#fff; padding:11px 20px;
  border-radius:24px; font-size:13px; font-weight:600;
  box-shadow:0 4px 16px rgba(0,0,0,.25); white-space:nowrap;
  opacity:0; pointer-events:none; transition:opacity .25s, transform .25s;
  z-index:999;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* modal */
.modal-bg {
  position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:500;
  display:none; align-items:flex-end;
}
.modal-bg.open { display:flex; }
.modal {
  background:var(--white); border-radius:18px 18px 0 0;
  width:100%; max-height:85vh; overflow-y:auto;
  padding:20px 20px calc(20px + var(--safe-b));
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.modal-bg.open .modal { transform:translateY(0); }
.modal-title { font-size:16px; font-weight:700; margin-bottom:16px; color:var(--blue-d); }
.modal-btns { display:flex; flex-direction:column; gap:10px; }
.modal-action {
  width:100%; border:none; border-radius:10px; padding:14px;
  font-size:14px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; gap:10px;
}
.modal-action:active { filter:brightness(.9); }
.modal-cancel { background:var(--gray-l); color:var(--text-2); margin-top:4px; }

/* ── TRANSLATE ── */
.translate-btn {
  width:100%; border:none; border-radius:8px; padding:10px 12px;
  font-size:13px; font-weight:700; cursor:pointer;
  background: linear-gradient(135deg, #7b1fa2, #1565c0);
  color:#fff; display:flex; align-items:center; justify-content:center; gap:6px;
  transition: opacity .15s;
}
.translate-btn:active { opacity:.8; }
.translate-btn:disabled { background:#b0bec5; cursor:not-allowed; }
.translate-btn.loading { animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

.translated-badge {
  display:inline-flex; align-items:center; gap:4px;
  font-size:10px; font-weight:700; color:#2e7d32;
  background:#e8f5e9; border-radius:10px; padding:2px 8px;
  margin-left:6px;
}

/* ── API KEY BANNER ── */
.key-banner {
  background: linear-gradient(135deg, #4a148c, #1565c0);
  color:#fff; border-radius:var(--radius);
  padding:12px 14px; display:flex; align-items:center; gap:10px;
}
.key-banner-icon { font-size:22px; flex-shrink:0; }
.key-banner-text { flex:1; }
.key-banner-title { font-size:13px; font-weight:700; }
.key-banner-sub   { font-size:11px; opacity:.8; margin-top:2px; }
.key-banner-btn {
  background:rgba(255,255,255,.2); border:none; color:#fff;
  border-radius:8px; padding:8px 14px; font-size:13px; font-weight:700;
  cursor:pointer; white-space:nowrap; flex-shrink:0;
}
.key-banner-btn:active { background:rgba(255,255,255,.35); }
.key-set-banner {
  background:#e8f5e9; border:1px solid #a5d6a7;
  border-radius:var(--radius); padding:10px 14px;
  display:flex; align-items:center; gap:10px;
}
.key-set-banner span { flex:1; font-size:13px; color:#2e7d32; font-weight:600; }
.key-set-change {
  background:none; border:1px solid #a5d6a7; color:#2e7d32;
  border-radius:8px; padding:6px 12px; font-size:12px; font-weight:700; cursor:pointer;
}

/* ── KEY MODAL ── */
.key-modal-bg {
  position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:600;
  display:none; align-items:flex-end;
}
.key-modal-bg.open { display:flex; }
.key-modal {
  background:var(--white); border-radius:18px 18px 0 0;
  width:100%; padding:24px 20px calc(24px + var(--safe-b));
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.key-modal-bg.open .key-modal { transform:translateY(0); }
.key-modal-title { font-size:16px; font-weight:700; color:var(--blue-d); margin-bottom:6px; }
.key-modal-hint  { font-size:12px; color:var(--text-2); line-height:1.5; margin-bottom:16px; }
.key-modal-hint a { color:var(--blue); }
.key-input-wrap { position:relative; margin-bottom:14px; }
.key-input-wrap input {
  width:100%; padding:12px 44px 12px 12px;
  border-radius:10px; border:1.5px solid var(--border);
  font-size:14px; font-family:monospace; background:#fafbfc;
}
.key-input-wrap input:focus {
  outline:none; border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-l);
}
.key-eye {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  background:none; border:none; font-size:18px; cursor:pointer; color:var(--gray);
}
.key-modal-save {
  width:100%; border:none; border-radius:10px; padding:14px;
  background:var(--blue); color:#fff; font-size:15px; font-weight:700;
  cursor:pointer; margin-bottom:10px;
}
.key-modal-save:active { filter:brightness(.9); }
.key-modal-cancel {
  width:100%; border:none; border-radius:10px; padding:12px;
  background:var(--gray-l); color:var(--text-2); font-size:14px; font-weight:600;
  cursor:pointer;
}
.key-modal-del {
  width:100%; border:none; border-radius:10px; padding:12px; margin-top:8px;
  background:#fce4e4; color:var(--red); font-size:13px; font-weight:600;
  cursor:pointer; display:none;
}

/* ── SAVED CUSTOM MODAL ── */
.sc-modal-bg {
  position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:600;
  display:none; align-items:flex-end;
}
.sc-modal-bg.open { display:flex; }
.sc-modal {
  background:var(--white); border-radius:18px 18px 0 0;
  width:100%; max-height:80vh; display:flex; flex-direction:column;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.sc-modal-bg.open .sc-modal { transform:translateY(0); }
.sc-modal-hd {
  padding:18px 18px 12px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.sc-modal-title { font-size:16px; font-weight:700; color:var(--blue-d); }
.sc-modal-close {
  width:32px; height:32px; border-radius:50%; background:var(--gray-l);
  border:none; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.sc-modal-list {
  flex:1; overflow-y:auto; padding:10px 14px calc(10px + var(--safe-b));
  display:flex; flex-direction:column; gap:8px;
}
.sc-empty {
  text-align:center; color:var(--text-2); font-size:13px;
  padding:32px 0;
}
.sc-item {
  display:flex; align-items:center; gap:10px;
  background:#fafbfc; border:1px solid var(--border);
  border-radius:10px; padding:10px 12px;
}
.sc-item-dot {
  width:12px; height:12px; border-radius:50%; flex-shrink:0;
}
.sc-item-info { flex:1; min-width:0; }
.sc-item-label { font-size:14px; font-weight:700; color:var(--text); }
.sc-item-sub   { font-size:11px; color:var(--text-2); margin-top:2px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sc-item-add {
  background:var(--blue); color:#fff; border:none; border-radius:8px;
  padding:7px 12px; font-size:12px; font-weight:700; cursor:pointer; flex-shrink:0;
}
.sc-item-add:active { filter:brightness(.9); }
.sc-item-del {
  background:#fce4e4; color:var(--red); border:none; border-radius:8px;
  padding:7px 10px; font-size:12px; cursor:pointer; flex-shrink:0;
}
.sc-item-del:active { filter:brightness(.9); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div>
    <div class="topbar-title">📋 每日工作排程</div>
    <div class="topbar-sub" id="topbar-date-display">載入中…</div>
  </div>
  <button class="topbar-btn" onclick="showMenu()">⋯ 選項</button>
</div>

<!-- SCROLL AREA -->
<div class="scroll-area" id="scroll-area">

  <!-- API KEY BANNER -->
  <div id="key-banner-missing" class="key-banner">
    <div class="key-banner-icon">🔑</div>
    <div class="key-banner-text">
      <div class="key-banner-title">需要設定 API Key</div>
      <div class="key-banner-sub">才能使用自動翻譯功能</div>
    </div>
    <button class="key-banner-btn" onclick="openKeyModal()">設定</button>
  </div>
  <div id="key-banner-set" class="key-set-banner" style="display:none">
    <span>🔑 API Key 已設定，翻譯功能啟用</span>
    <button class="key-set-change" onclick="openKeyModal()">更改</button>
  </div>

  <!-- META CARD -->
  <div class="card">
    <div class="card-hd">📅 基本資訊</div>
    <div class="card-body">
      <div class="field">
        <label>日期 DATE / วันที่</label>
        <input type="date" id="meta-date" value="2026-06-23" oninput="updateDateDisplay()">
      </div>
      <div class="field">
        <label>工作時間 HOURS</label>
        <input type="text" id="meta-hours" value="08:00 ~ 17:00">
      </div>
      <div class="field">
        <label>工作人員 STAFF（中文，用 | 分隔）</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <input type="text" id="meta-staff" style="flex:1;"
            value="阿智 (Trí / ธิ) | 阿榮 (Vinh / วิน) | 阿望 (Vọng / ว่อง)"
            placeholder="例：阿智 | 阿榮 | 阿望">
          <button id="staff-tbtn" onclick="translateStaff()"
            style="flex-shrink:0;border:none;border-radius:8px;padding:10px 12px;
            background:linear-gradient(135deg,#7b1fa2,#1565c0);color:#fff;
            font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;">
            ✨ 翻譯
          </button>
        </div>
        <div style="margin-top:6px;display:flex;gap:6px;align-items:center;">
          <span style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:20px;border-radius:3px;background:#c62828;font-size:9px;font-weight:700;color:#fff;flex-shrink:0;">VN</span>
          <input type="text" id="meta-staff-vi" style="flex:1;font-size:13px;font-style:italic;"
            placeholder="Nhân viên tiếng Việt…">
        </div>
        <div style="margin-top:6px;display:flex;gap:6px;align-items:center;">
          <span style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:20px;border-radius:3px;background:#ef6c00;font-size:9px;font-weight:700;color:#fff;flex-shrink:0;">TH</span>
          <input type="text" id="meta-staff-th" style="flex:1;font-size:13px;"
            placeholder="พนักงานภาษาไทย…">
        </div>
      </div>
    </div>
  </div>

  <!-- ROWS will be injected here -->
  <div id="rows-container"></div>

  <!-- ADD BAR -->
  <div class="add-bar">
    <div class="add-bar-title">＋ 新增工作列</div>
    <div class="add-btns">
      <button class="add-btn" onclick="addRow('A')">🟢 A區作業</button>
      <button class="add-btn" onclick="addRow('B')">🔵 B區作業</button>
      <button class="add-btn" onclick="addRow('C')">🟠 C區包裝</button>
      <button class="add-btn" onclick="addRow('X')">⚙️ 其他</button>
      <button class="add-btn" id="saved-custom-btn" onclick="openSavedCustomModal()" style="background:var(--blue-l);color:var(--blue-d);">⭐ 常用自訂</button>
    </div>
  </div>

</div>

<!-- BOTTOM BAR -->
<div class="bottombar">
  <button class="bb-btn bb-save" onclick="saveTemplate()">💾 儲存模板</button>
  <button class="bb-btn bb-pdf" onclick="generatePDF()">⬇ 產生 PDF</button>
</div>

<!-- OPTIONS MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closeMenuIfBg(event)">
  <div class="modal">
    <div class="modal-title">選項</div>
    <div class="modal-btns">
      <button class="modal-action" style="background:var(--blue-l);color:var(--blue-d);" onclick="saveTemplate();closeMenu()">
        💾 儲存模板（瀏覽器記憶）
      </button>
      <button class="modal-action" style="background:#fff3e0;color:#e65100;" onclick="confirmReset()">
        ↺ 重置為預設模板
      </button>
      <button class="modal-action modal-cancel" onclick="closeMenu()">取消</button>
    </div>
  </div>
</div>

<!-- API KEY MODAL -->
<div class="key-modal-bg" id="key-modal-bg" onclick="closeKeyIfBg(event)">
  <div class="key-modal">
    <div class="key-modal-title">🔑 設定 Anthropic API Key</div>
    <div class="key-modal-hint">
      Key 只存在你手機/電腦的瀏覽器，不會上傳到任何伺服器。<br>

let rows = [];
let nextId = 20;

// ────────────────────────────────────────────────
// INIT
// ────────────────────────────────────────────────
function loadState() {
  const saved = localStorage.getItem('schedule_template_mobile');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      // B5 fix: validate rows is non-empty array before using it
      if (Array.isArray(s.rows) && s.rows.length > 0) {
        rows = s.rows;
        document.getElementById('meta-date').value     = s.date    || '2026-06-23';
        document.getElementById('meta-hours').value    = s.hours   || '08:00 ~ 17:00';
        document.getElementById('meta-staff').value    = s.staff   || '';
        document.getElementById('meta-staff-vi').value = s.staffVi || '';
        document.getElementById('meta-staff-th').value = s.staffTh || '';
        nextId = Math.max(20, ...rows.map(r => typeof r.id==='number' ? r.id + 1 : 0));
        return;
      }
    } catch(e) { console.warn('loadState: parse error', e); }
  }
  rows = JSON.parse(JSON.stringify(DEFAULT_ROWS));
}

function updateDateDisplay() {
  const val = document.getElementById('meta-date').value;
  if (!val) return;
  const d = new Date(val + 'T00:00:00');
  // B9 fix: guard against Invalid Date in edge-case timezones
  if (isNaN(d.getTime())) return;
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('topbar-date-display').textContent =
    `${val.replace(/-/g,'/')} (${days[d.getDay()]})`;
}

// ────────────────────────────────────────────────
// RENDER
// ────────────────────────────────────────────────

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

// partial DOM updates (avoid full re-render on every keystroke)
function updateField(idx, key, val) {
  rows[idx][key] = val;
}

// ────────────────────────────────────────────────
// SAVED CUSTOM STATUSES
// ────────────────────────────────────────────────
const SAVED_CUSTOM_KEY = 'schedule_saved_custom_statuses';

function getSavedCustom() {
  // B1 fix: validate structure, warn on corruption instead of silently returning []
  try {
    const raw = localStorage.getItem(SAVED_CUSTOM_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) throw new Error('not array');
    return parsed.filter(x => x && typeof x.label === 'string' && typeof x.color === 'string');
  } catch(e) {
    console.warn('getSavedCustom: corrupted data, resetting.', e);
    localStorage.removeItem(SAVED_CUSTOM_KEY);
    return [];
  }
}
function setSavedCustom(list) {
  localStorage.setItem(SAVED_CUSTOM_KEY, JSON.stringify(list));
}

function saveCustomToFavorites(idx) {
  const row = rows[idx];
  if (!row || row.status !== '__custom__') return;
  const label = (row.customStatus || '').trim();
  if (!label) { toast('⚠️ 請先輸入狀態名稱'); return; }
  const color = row.customColor || '#2e7d32';
  const zh    = (row.zh || '').trim();
  const vi    = (row.vi || '').trim();
  const th    = (row.th || '').trim();

  const list = getSavedCustom();
  // B4 fix: duplicate check includes content (zh), not just label+color
  const exists = list.some(x => x.label === label && x.color === color && x.zh === zh);
  if (exists) { toast('⭐ 完全相同的項目已在常用清單中'); return; }

  // B2 fix: assign stable numeric id to each item
  list.push({ id: Date.now(), label, color, labelVi: (row.customStatusVi||'').trim(), labelTh: (row.customStatusTh||'').trim(), zh, vi, th });
  setSavedCustom(list);
  updateSavedCustomBtn();
  toast('⭐ 已加入常用清單！');
}

function updateSavedCustomBtn() {
  const list = getSavedCustom();
  const btn  = document.getElementById('saved-custom-btn');
  if (!btn) return;
  btn.textContent = list.length > 0 ? `⭐ 常用自訂 (${list.length})` : '⭐ 常用自訂';
}

function openSavedCustomModal() {
  renderSCList();
  document.getElementById('sc-modal-bg').classList.add('open');
}
function closeSavedCustomModal() {
  document.getElementById('sc-modal-bg').classList.remove('open');
}
function closeSCIfBg(e) {
  if (e.target === document.getElementById('sc-modal-bg')) closeSavedCustomModal();
}

function renderSCList() {
  const list = getSavedCustom();
  const el   = document.getElementById('sc-modal-list');
  if (!el) return;
  if (list.length === 0) {
    el.innerHTML = `<div class="sc-empty">尚無常用自訂狀態<br><span style="font-size:11px;">新增自訂列後按「⭐ 儲存為常用」</span></div>`;
    return;
  }
  // B2 fix: embed stable item.id as string attribute, not array index
  el.innerHTML = list.map(item => `
    <div class="sc-item">
      <div class="sc-item-dot" style="background:${esc(item.color)}"></div>
      <div class="sc-item-info">
        <div class="sc-item-label">${esc(item.label)}</div>
        <div class="sc-item-sub">${esc(item.zh) || '（無工作內容）'}</div>
      </div>
      <button class="sc-item-add" onclick="addRowFromSaved('${item.id}')">＋ 新增</button>
      <button class="sc-item-del" onclick="deleteSavedCustom('${item.id}')">🗑</button>
    </div>
  `).join('');
}

// B2 fix: look up by stable item.id, not array index
function addRowFromSaved(itemId) {
  const list = getSavedCustom();
  const item = list.find(x => String(x.id) === String(itemId));
  if (!item) { toast('⚠️ 找不到該常用項目'); return; }
  const newRow = {
    id: nextId++,
    timeStart: '08:00', timeEnd: '09:00',
    status: '__custom__',
    customStatus:   item.label,
    customStatusVi: item.labelVi || '',
    customStatusTh: item.labelTh || '',
    customColor:    item.color,
    zh: item.zh || '',
    vi: item.vi || '',
    th: item.th || '',
  };
  rows.push(newRow);
  openRowIdx = rows.length - 1;
  closeSavedCustomModal();
  render();
  setTimeout(() => {
    const cards = document.querySelectorAll('.row-card');
    if (cards.length) cards[cards.length-1].scrollIntoView({behavior:'smooth'});
  }, 80);
  toast(`✅ 已新增「${item.label}」`);
}

// B2+B3 fix: use stable item.id; re-read storage after confirm() to avoid stale index
function deleteSavedCustom(itemId) {
  const list = getSavedCustom();
  const item = list.find(x => String(x.id) === String(itemId));
  if (!item) { renderSCList(); return; }
  if (!confirm(`確定刪除常用「${item.label}」？`)) return;
  // re-read after confirm in case storage changed during prompt
  const freshList = getSavedCustom();
  const newList = freshList.filter(x => String(x.id) !== String(itemId));
  setSavedCustom(newList);
  updateSavedCustomBtn();
  renderSCList();
  toast('🗑 已刪除');
}

// get display info for a row (handles custom status)
function getStatusInfo(row) {
  if (row.status === '__custom__') {
    const color = row.customColor || '#2e7d32';
    return {
      label: row.customStatus || '自訂狀態',
      zone: 'CUSTOM',
      color,
      vi: row.customStatusVi || row.customStatus || '',
      th: row.customStatusTh || row.customStatus || '',
    };
  }
  const s = STATUS_OPTIONS[row.status] || STATUS_OPTIONS.clean;
  const zoneColors = {A:'#2e7d32', B:'#1565c0', C:'#e65100', L:'#f57f17', X:'#607d8b'};
  return { label: s.label, zone: s.zone, color: zoneColors[s.zone]||'#607d8b', vi: s.vi, th: s.th };
}
function updateHeader(idx) {
  const card = document.querySelector(`.row-card[data-idx="${idx}"]`);
  if (!card) return;
  const row = rows[idx];
  const sinfo = getStatusInfo(row);
  const timeEl = card.querySelector('.row-time');
  if (timeEl) timeEl.textContent = `${row.timeStart} ~ ${row.timeEnd}`;
  const labelEl = card.querySelector('.row-status-label');
  if (labelEl) {
    labelEl.textContent = sinfo.label;
    if (sinfo.zone === 'CUSTOM') {
      labelEl.className = 'row-status-label';
      labelEl.style.background = sinfo.color;
    } else {
      labelEl.className = `row-status-label z-${sinfo.zone}`;
      labelEl.style.background = '';
    }
  }
}
function updatePreview(idx) {
  const card = document.querySelector(`.row-card[data-idx="${idx}"]`);
  if (!card) return;
  const prev = card.querySelector('.row-preview');
  if (prev) prev.textContent = (rows[idx].zh||'').split('\n')[0] || '—';
}
function renderRowHeader(idx) {
  // status/color changed — just re-render; keep whatever row is currently open
  render();
}

function toggleRow(idx) {
  openRowIdx = openRowIdx === idx ? null : idx;
  render();
  if (openRowIdx === idx) {
    setTimeout(() => {
      const card = document.querySelector(`.row-card[data-idx="${idx}"]`);
      if (card) card.scrollIntoView({behavior:'smooth', block:'nearest'});
    }, 50);
  }
}

// ────────────────────────────────────────────────
// MUTATIONS
// ────────────────────────────────────────────────
function moveRow(idx, dir) {
  const ni = idx + dir;
  if (ni < 0 || ni >= rows.length) return;
  [rows[idx], rows[ni]] = [rows[ni], rows[idx]];
  if (openRowIdx === idx) openRowIdx = ni;
  else if (openRowIdx === ni) openRowIdx = idx;
  render();
}
function deleteRow(idx) {
  rows.splice(idx, 1);
  if (openRowIdx === idx) openRowIdx = null;
  else if (openRowIdx > idx) openRowIdx--;
  // guard: clamp to valid range after deletion
  if (openRowIdx !== null && openRowIdx >= rows.length) openRowIdx = null;
  render();
}
function addRow(zone) {
  const statusMap = {A:'A_prep', B:'B_run', C:'C_pack', X:'clean'};
  const newRow = { id:nextId++, timeStart:'08:00', timeEnd:'09:00',
    status: statusMap[zone]||'clean', zh:'', vi:'', th:'' };
  rows.push(newRow);
  openRowIdx = rows.length - 1;
  render();
  setTimeout(() => {
    const cards = document.querySelectorAll('.row-card');
    if (cards.length) cards[cards.length-1].scrollIntoView({behavior:'smooth'});
  }, 80);
}

async function translateStaff() {
  const zhStaff = document.getElementById('meta-staff').value.trim();
  if (!zhStaff) { toast('⚠️ 請先輸入中文工作人員名稱'); return; }

  const apiKey = getApiKey();
  if (!apiKey) { toast('⚠️ 請先設定 API Key'); openKeyModal(); return; }

  const btn = document.getElementById('staff-tbtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳…'; }

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 300,
        system: `你是工廠排程翻譯專家。將中文人名清單翻譯成越南文和泰文版本。
人名對應：阿智→Trí/ธิ，阿榮→Vinh/วิน，阿望→Vọng/ว่อง，新人→nhân viên mới/พนักงานใหม่。
其他名字請音譯或意譯，保持 | 分隔格式。
只輸出 JSON，格式為 {"vi":"...","th":"..."}，不要其他文字。`,
        messages: [{ role: 'user', content: `翻譯工作人員名單：${zhStaff}` }]
      })
    });

    if (response.status === 401) throw new Error('invalid_key');
    const data = await response.json();
    if (data.error) throw new Error(data.error.message || 'api_error');

    const raw    = data.content?.[0]?.text || '';
    const clean  = raw.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);

    if (result.vi && result.th) {
      document.getElementById('meta-staff-vi').value = result.vi;
      document.getElementById('meta-staff-th').value = result.th;
      toast('✅ 工作人員名稱翻譯完成！');
    } else {
      throw new Error('unexpected response shape');
    }
  } catch(e) {
    if (e.message === 'invalid_key') {
      toast('❌ API Key 無效'); openKeyModal();
    } else {
      toast('❌ 翻譯失敗：' + e.message);
    }
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '✨ 翻譯'; }
  }
}

let _toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  // B7 fix: cancel previous timer before showing new toast
  if (_toastTimer) { clearTimeout(_toastTimer); _toastTimer = null; }
  el.textContent = msg;
  el.classList.add('show');
  _toastTimer = setTimeout(() => { el.classList.remove('show'); _toastTimer = null; }, 2800);
}

// ────────────────────────────────────────────────
// PDF
// ────────────────────────────────────────────────
function generatePDF() {
  const date  = document.getElementById('meta-date').value || new Date().toISOString().slice(0,10);
  const hours = document.getElementById('meta-hours').value;
  const staff = document.getElementById('meta-staff').value;
  const d = new Date(date + 'T00:00:00');
  const wd = ['(日)','(一)','(二)','(三)','(四)','(五)','(六)'];
  const dayStr = isNaN(d.getDay()) ? '' : wd[d.getDay()];
  const dateLabel = `${date.replace(/-/g,'/')} ${dayStr}`;

  const lunchIdx = rows.findIndex(r => r.status === 'lunch');
  const p1 = lunchIdx >= 0 ? rows.slice(0, lunchIdx+1) : rows.slice(0, Math.ceil(rows.length/2));
  const p2 = lunchIdx >= 0 ? rows.slice(lunchIdx+1)    : rows.slice(Math.ceil(rows.length/2));

  let ci = 0;
  // B6 fix: beyond CIRCLE array, generate enclosed numbers or use safe fallback
  function circle(row) {
    if (row.status==='lunch') return '-';
    const n = ci++;
    return CIRCLE[n] || `(${n+1})`;
  }

  function escPDF(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // B8 fix: escape content before injecting into PDF HTML
  function lines(text, cls, alertCls) {
    return (text||'').split('\n').map(l => {
      const safe = escPDF(l);
      return (l.startsWith('※')||l.startsWith('⚠'))
        ? `<span class="${alertCls}">${safe}</span>`
        : `<span class="${cls}">${safe}</span>`;
    }).join('<br>');
  }

  function rowHTML(row) {
    const isL  = row.status==='lunch';
    const si   = getStatusInfo(row);
    const zc   = si.color;
    const c    = circle(row);
    const lb   = isL ? 'background:#fffde7;' : '';
    return `<tr style="${lb}">
      <td style="text-align:center;font-weight:bold;font-size:12pt;${lb}">${c}</td>
      <td class="time-col" style="${isL?'background:#fffde7;':''}color:${isL?'#f57f17':'#0d47a1'}">${row.timeStart} ~ ${row.timeEnd}</td>
      <td class="sc" style="${lb}">
        <div><span class="tz">中</span><span class="sz" style="color:${isL?'#e65100':zc}">${si.label}</span></div>
        <div><span class="tv">VN</span><span class="sv"${isL?' style="color:#e65100"':''}>${si.vi}</span></div>
        <div><span class="tt">TH</span><span class="st"${isL?' style="color:#e65100"':''}>${si.th}</span></div>
      </td>
      <td style="${lb}${isL?'color:#f57f17;font-style:italic;text-align:center;':''}">
        ${isL ? `${row.zh} (${row.vi} / ${row.th})` : `
        <div><span class="tz">中</span>${lines(row.zh,'cz','az')}</div>
        <div><span class="tv">VN</span>${lines(row.vi,'cv','av')}</div>
        <div><span class="tt">TH</span>${lines(row.th,'ct','at')}</div>`}
      </td></tr>`;
  }

  ci = 0;
  const r1 = p1.map(rowHTML).join('');
  const r2 = p2.map(rowHTML).join('');

  const staffZh = document.getElementById('meta-staff').value;
  const staffVi = document.getElementById('meta-staff-vi').value;
  const staffTh = document.getElementById('meta-staff-th').value;

  const hdr = (pg) => `
  <div class="hc">
    <div>
      <div class="h1t">每日工作排程表 (Lịch Trình Làm Việc Hàng Ngày / ตารางงานประจำวัน)</div>
      <div class="sub">全日排程 (${hours}) ｜ 第${pg}頁 / Trang ${pg} / หน้า ${pg}</div>
    </div>
    <div class="db">日期: ${dateLabel}</div>
  </div>
  <div class="mi">
    <div><strong>工作人員:</strong> ${staffZh.split('|').map(s=>`<span class="nh">${escPDF(s.trim())}</span>`).join(' | ')}</div>
    ${staffVi ? `<div style="font-size:9pt;color:#4f4f4f;font-style:italic;margin-top:1px;"><strong>Nhân viên:</strong> ${escPDF(staffVi)}</div>` : ''}
    ${staffTh ? `<div style="font-size:9pt;color:#5d4037;margin-top:1px;"><strong>พนักงาน:</strong> ${escPDF(staffTh)}</div>` : ''}
  </div>`;

  const th = `<thead><tr>
    <th style="width:4%">編號<br><span style="font-size:7pt;font-weight:400;opacity:.85">số TT<br>ลำดับ</span></th>
    <th style="width:13%">時間<br><span style="font-size:7pt;font-weight:400;opacity:.85">Thời gian<br>เวลา</span></th>
    <th style="width:21%">狀態 / 項目<br><span style="font-size:7pt;font-weight:400;opacity:.85">Trạng thái / Hạng mục<br>สถานะ / รายการ</span></th>
    <th>工作內容人員分配<br><span style="font-size:7pt;font-weight:400;opacity:.85">Nội dung công việc & Phân công nhân sự<br>รายละเอียดงานและการมอบหมายงาน</span></th>
  </tr></thead>`;

  const html = `<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8">
<style>
body{font-family:"Noto Sans TC","Segoe UI",sans-serif;margin:0;color:#2c3e50;line-height:1.2}
*{box-sizing:border-box}
.pg{width:297mm;height:210mm;padding:5mm 8mm;overflow:hidden;page-break-after:always;display:flex;flex-direction:column}
.pg:last-child{page-break-after:avoid}
.hc{border-left:5px solid #1565c0;padding-left:10px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:flex-end;flex-shrink:0}
.h1t{font-size:14pt;color:#0d47a1;font-weight:700}
.sub{font-size:10pt;color:#555}
.db{font-size:11pt;font-weight:700;border-bottom:2px solid #333;width:175px;text-align:center}
.mi{font-size:10pt;background:#e3f2fd;padding:4px 10px;border-radius:4px;margin-bottom:5px;border:1px solid #bbdefb;flex-shrink:0}
.nh{font-weight:700;color:#1565c0}
table{width:100%;border-collapse:collapse;font-size:9.5pt;flex:1}
th,td{border:1px solid #b0bec5;padding:3px 7px;vertical-align:middle}
th{background:#1565c0;color:#fff;font-weight:700;font-size:10pt;text-align:center}
.time-col{font-weight:700;color:#0d47a1;text-align:center;white-space:nowrap;background:#f7f9fa;font-size:10.5pt}
.sc{vertical-align:middle}
.tz,.tv,.tt{display:inline-block;font-size:7.5pt;font-weight:700;padding:0 2px;border-radius:2px;margin-right:4px;color:#fff;width:22px;text-align:center}
.tz{background:#1565c0}.tv{background:#c62828}.tt{background:#ef6c00}
.sz{font-weight:700;font-size:9.5pt}
.sv{font-size:8.5pt;color:#4f4f4f;font-style:italic}
.st{font-size:8.5pt;color:#5d4037}
.cz{font-size:9.5pt;color:#212121}.cv{font-size:8.5pt;color:#4f4f4f;font-style:italic}.ct{font-size:8.5pt;color:#5d4037}
.az{color:#c62828;font-weight:700}.av{color:#b71c1c;font-weight:700;font-style:italic}.at{color:#b71c1c;font-weight:700}
.tlb{border:1px solid #b0bec5;background:#fafafa;border-radius:6px;padding:5px 8px;flex-shrink:0;margin-top:4px}
.tlt{font-size:10pt;font-weight:700;color:#0d47a1;margin:0 0 4px;border-bottom:1px solid #b0bec5;padding-bottom:2px}
.tlc{display:flex;gap:7px}
.sc2{flex:1;background:#fff;border-radius:4px;border:1px solid #cfd8dc;padding:5px 8px}
.sh{font-size:9.5pt;font-weight:700;color:#fff;padding:2px 7px;border-radius:3px;margin-bottom:4px}
.sa{background:#2e7d32}.sb{background:#1565c0}.sc3{background:#e65100}
.sd{font-size:8pt;line-height:1.3}
.sd div{margin-bottom:3px}
</style></head><body>
<div class="pg">${hdr(1)}<table>${th}<tbody>${r1}</tbody></table></div>
<div class="pg">${hdr(2)}<table>${th}<tbody>${r2}</tbody></table>
<div class="tlb">
  <div class="tlt">🛠️ 站點主要作業流程說明 (Quy trình trạm / ขั้นตอนการทำงานของแต่ละโซน)</div>
  <div class="tlc">
    <div class="sc2"><div class="sh sa">A區：整料區 (Sắp xếp / จัดเตรียม)</div>
      <div class="sd">
        <div><span class="tz">中</span><span class="cz">拆板、拆卸鐵件、塑膠件、水泥等非鋁組件。</span></div>
        <div><span class="tv">VN</span><span class="cv">Tháo tấm, tháo dỡ các vật thể phi nhôm (sắt, nhựa, xi măng).</span></div>
        <div><span class="tt">TH</span><span class="ct">ถอดแผ่น, ถอดชิ้นส่วนที่ไม่ใช่อลูมิเนียม (เหล็ก, พลาสติก, ปูน)</span></div>
      </div>
    </div>
    <div class="sc2"><div class="sh sb">B區：噴砂機作業區 (Phun cát / พ่นทราย)</div>
      <div class="sd">
        <div><span class="tz">中</span><span class="cz">投貨、接貨、鋁膜分類。<span class="az"> ⚠️ 殘留非鋁件退回A區！</span></span></div>
        <div><span class="tv">VN</span><span class="cv">Nạp hàng, nhận hàng và phân loại nhôm.<span class="av"> ⚠️ Trả về Khu A nếu còn sót!</span></span></div>
        <div><span class="tt">TH</span><span class="ct">ใส่ของ, รับของ, แยกประเภทอลูมิเนียม<span class="at"> ⚠️ ส่งกลับโซน A ถ้ามีตกค้าง!</span></span></div>
      </div>
    </div>
    <div class="sc2"><div class="sh sc3">C區：包裝區 (Đóng gói / แพ็คของ)</div>
      <div class="sd">
        <div><span class="tz">中</span><span class="cz">鋁膜疊板作業。<span class="az"> ⚠️ 疊板時需雙重非鋁件殘留檢查！</span></span></div>
        <div><span class="tv">VN</span><span class="cv">Xếp chồng tấm nhôm.<span class="av"> ⚠️ Kiểm tra kỹ khi xếp chồng!</span></span></div>
        <div><span class="tt">TH</span><span class="ct">งานจัดเรียงแผ่นอลูมิเนียม<span class="at"> ⚠️ ตรวจสอบชิ้นส่วนตกค้างทุกครั้ง!</span></span></div>
      </div>
    </div>
  </div>
</div>
</div></body></html>`;

  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const win = window.open(url, '_blank');
  if (!win) { toast('❌ 請允許彈出視窗後再試'); return; }
  win.onload = () => { setTimeout(() => { win.print(); URL.revokeObjectURL(url); }, 600); };
  toast('📄 已開啟列印視窗 → 選「另存為 PDF」');
}

// ────────────────────────────────────────────────
// BOOT
// ────────────────────────────────────────────────
loadState();
refreshKeyBanner();
updateSavedCustomBtn();
render();
</script>
</body>
